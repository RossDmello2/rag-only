name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:syntax
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e with mocked local services
        run: |
          node <<'NODE' &
          const http = require('node:http');

          function sendJson(response, statusCode, payload) {
            response.writeHead(statusCode, {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'GET,POST,PUT,OPTIONS',
              'Content-Type': 'application/json',
            });
            response.end(JSON.stringify(payload));
          }

          http.createServer((request, response) => {
            if (request.method === 'OPTIONS') return sendJson(response, 200, {});
            if (request.url === '/api/tags') {
              return sendJson(response, 200, { models: [{ name: 'llama3.1:8b-instruct-q4_K_M' }] });
            }
            return sendJson(response, 404, { error: 'mock route not found' });
          }).listen(11434, '127.0.0.1');

          http.createServer((request, response) => {
            if (request.method === 'OPTIONS') return sendJson(response, 200, {});
            if (request.url === '/collections') {
              return sendJson(response, 200, { result: { collections: [{ name: 'rag_documents' }] } });
            }
            return sendJson(response, 404, { error: 'mock route not found' });
          }).listen(6333, '127.0.0.1');

          setInterval(() => {}, 1000);
          NODE
          MOCK_PID=$!
          trap "kill $MOCK_PID" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null && curl -fsS http://127.0.0.1:6333/collections >/dev/null; then
              npm run test:e2e
              exit 0
            fi
            sleep 1
          done
          echo "Mock local services did not become ready in time."
          exit 1
      - run: npm audit --audit-level=high
